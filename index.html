<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu with Dynamic Content</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        function showContent(contentId) {
            const contents = document.querySelectorAll('.content-section');
            contents.forEach(content => content.style.display = 'none');
            document.getElementById(contentId).style.display = 'block';
        }
    </script>
</head>
<body>
    <header class="top-nav">
        <div class="logo">My Website</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <aside class="sidebar">
            <ul>
                <li><a href="#" onclick="showContent('content1')">Menu 1</a></li>
                <li><a href="#" onclick="showContent('content2')">Menu 2</a></li>
                <li><a href="#" onclick="showContent('content3')">Menu 3</a></li>
            </ul>
        </aside>
        <main class="content">
            <div id="content1" class="content-section">
                <h1>Content 1</h1>
                <p>This is the content for Menu 1.</p>
            </div>
            <div id="content2" class="content-section" style="display: none;">
                <h1>Content 2</h1>
                <p>This is the content for Menu 2.</p>
            </div>
            <div id="content3" class="content-section" style="display: none;">
                <h1>Content 3</h1>
                <p>This is the content for Menu 3.</p>
            </div>
        </main>
    </div>
</body>
</html>
